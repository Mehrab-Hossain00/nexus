<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Study Pro | Premium Academic Suite</title>
    <link rel="icon" type="image/svg+xml" href="./logo.svg" />
    <script>
      window.process = window.process || {};
      window.process.env = window.process.env || {};
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              nexus: {
                black: 'var(--nexus-bg)',
                card: 'var(--nexus-card)',
                border: 'var(--nexus-border)',
                violet: 'var(--nexus-accent-alt)',
                electric: 'var(--nexus-accent)',
                slate: '#94A3B8'
              }
            },
            animation: {
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'glow': 'glow 3s ease-in-out infinite alternate',
            },
            keyframes: {
              fadeIn: { '0%': { opacity: '0' }, '100%': { opacity: '1' } },
              slideUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              glow: {
                '0%': { boxShadow: '0 0 10px rgba(var(--nexus-accent-rgb), 0.1)' },
                '100%': { boxShadow: '0 0 25px rgba(var(--nexus-accent-rgb), 0.3)' }
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --nexus-bg: #000000;
        --nexus-accent: #7C3AED;
        --nexus-accent-alt: #8B5CF6;
        --nexus-accent-rgb: 124, 58, 237;
        --nexus-card: #0A0A0A;
        --nexus-border: rgba(255, 255, 255, 0.08);
      }

      [data-theme='midnight'] {
        --nexus-accent: #2563EB;
        --nexus-accent-alt: #3B82F6;
        --nexus-accent-rgb: 37, 99, 235;
      }

      [data-theme='blackout'] {
        --nexus-accent: #FFFFFF;
        --nexus-accent-alt: #E5E7EB;
        --nexus-accent-rgb: 255, 255, 255;
      }

      [data-theme='neon_protocol'] {
        --nexus-accent: #D946EF;
        --nexus-accent-alt: #E879F9;
        --nexus-accent-rgb: 217, 70, 239;
      }

      [data-theme='oceanic'] {
        --nexus-accent: #06B6D4;
        --nexus-accent-alt: #22D3EE;
        --nexus-accent-rgb: 6, 182, 212;
      }

      [data-theme='sunset'] {
        --nexus-accent: #F59E0B;
        --nexus-accent-alt: #FBBF24;
        --nexus-accent-rgb: 245, 158, 11;
      }

      [data-theme='forest'] {
        --nexus-accent: #10B981;
        --nexus-accent-alt: #34D399;
        --nexus-accent-rgb: 16, 185, 129;
      }

      [data-theme='crimson'] {
        --nexus-accent: #EF4444;
        --nexus-accent-alt: #F87171;
        --nexus-accent-rgb: 239, 68, 68;
      }

      [data-theme='discord_dark'] {
        --nexus-bg: #36393f;
        --nexus-card: #2f3136;
        --nexus-accent: #5865F2;
        --nexus-accent-alt: #7289da;
        --nexus-accent-rgb: 88, 101, 242;
        --nexus-border: #202225;
      }

      [data-theme='discord_light'] {
        --nexus-bg: #ffffff;
        --nexus-card: #f2f3f5;
        --nexus-accent: #5865F2;
        --nexus-accent-alt: #7289da;
        --nexus-accent-rgb: 88, 101, 242;
        --nexus-border: #e3e5e8;
      }
      [data-theme='discord_light'] body {
        color: #2e3338;
      }
      [data-theme='discord_light'] .text-white, 
      [data-theme='discord_light'] .text-zinc-100,
      [data-theme='discord_light'] .text-zinc-200,
      [data-theme='discord_light'] .text-zinc-300 {
        color: #060607 !important;
      }
      [data-theme='discord_light'] .text-zinc-400,
      [data-theme='discord_light'] .text-zinc-500 {
        color: #4f5660 !important;
      }
      [data-theme='discord_light'] .bg-nexus-black,
      [data-theme='discord_light'] .bg-zinc-900,
      [data-theme='discord_light'] .bg-zinc-950 {
        background-color: #ffffff !important;
      }
      [data-theme='discord_light'] .bg-zinc-800,
      [data-theme='discord_light'] .bg-zinc-900\/50 {
        background-color: #ebedef !important;
      }
      [data-theme='discord_light'] .border-white\/5,
      [data-theme='discord_light'] .border-white\/10 {
        border-color: #e3e5e8 !important;
      }

      [data-theme='gradient_aurora'] {
        --nexus-bg: #0f2027;
        --nexus-card: rgba(0, 0, 0, 0.4);
        --nexus-accent: #00f2fe;
        --nexus-accent-alt: #4facfe;
        --nexus-accent-rgb: 0, 242, 254;
        --nexus-border: rgba(0, 242, 254, 0.2);
      }
      body[data-theme='gradient_aurora'] {
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        background-attachment: fixed;
      }

      [data-theme='gradient_nebula'] {
        --nexus-bg: #2a0845;
        --nexus-card: rgba(0, 0, 0, 0.3);
        --nexus-accent: #ff0099;
        --nexus-accent-alt: #493240;
        --nexus-accent-rgb: 255, 0, 153;
        --nexus-border: rgba(255, 0, 153, 0.2);
      }
      body[data-theme='gradient_nebula'] {
        background: linear-gradient(135deg, #2a0845, #6441A5);
        background-attachment: fixed;
      }

      [data-theme='hacker_terminal'] {
        --nexus-bg: #000000;
        --nexus-card: #0a0a0a;
        --nexus-accent: #00ff00;
        --nexus-accent-alt: #33ff33;
        --nexus-accent-rgb: 0, 255, 0;
        --nexus-border: #003300;
      }
      [data-theme='hacker_terminal'] * {
        font-family: 'JetBrains Mono', monospace !important;
      }

      [data-theme='cherry_blossom'] {
        --nexus-bg: #2a1b2e;
        --nexus-card: #3d2645;
        --nexus-accent: #ffb7b2;
        --nexus-accent-alt: #ffdac1;
        --nexus-accent-rgb: 255, 183, 178;
        --nexus-border: #5c3a69;
      }
      body[data-theme='cherry_blossom'] {
        background: radial-gradient(circle at top right, #3d2645, #2a1b2e);
        background-attachment: fixed;
      }

      [data-theme='premium_gold'] {
        --nexus-bg: #1a1a1a;
        --nexus-card: #262626;
        --nexus-accent: #FFD700;
        --nexus-accent-alt: #FBBF24;
        --nexus-accent-rgb: 255, 215, 0;
        --nexus-border: #404040;
      }
      body[data-theme='premium_gold'] {
        background: radial-gradient(circle at top center, #262626, #1a1a1a);
        background-attachment: fixed;
      }

      [data-theme='premium_cyber'] {
        --nexus-bg: #050505;
        --nexus-card: #121212;
        --nexus-accent: #fcee0a;
        --nexus-accent-alt: #00ffff;
        --nexus-accent-rgb: 252, 238, 10;
        --nexus-border: #00ffff;
      }
      body[data-theme='premium_cyber'] {
        background: linear-gradient(135deg, #050505 0%, #001111 100%);
        background-attachment: fixed;
      }
      [data-theme='premium_cyber'] .bg-nexus-card {
        box-shadow: 4px 4px 0px rgba(0, 255, 255, 0.2);
        border-radius: 8px;
      }

      [data-theme='premium_ethereal'] {
        --nexus-bg: #e6f2ff;
        --nexus-card: #f0f7ff;
        --nexus-accent: #4da6ff;
        --nexus-accent-alt: #80bfff;
        --nexus-accent-rgb: 77, 166, 255;
        --nexus-border: #cce0ff;
      }
      body[data-theme='premium_ethereal'] {
        background: radial-gradient(circle at top left, #f0f7ff, #e6f2ff);
        background-attachment: fixed;
        color: #1a2b3c;
      }
      [data-theme='premium_ethereal'] .text-white, 
      [data-theme='premium_ethereal'] .text-zinc-100,
      [data-theme='premium_ethereal'] .text-zinc-200,
      [data-theme='premium_ethereal'] .text-zinc-300 {
        color: #0f172a !important;
      }
      [data-theme='premium_ethereal'] .text-zinc-400,
      [data-theme='premium_ethereal'] .text-zinc-500 {
        color: #64748b !important;
      }
      [data-theme='premium_ethereal'] .bg-nexus-black,
      [data-theme='premium_ethereal'] .bg-zinc-900,
      [data-theme='premium_ethereal'] .bg-zinc-950 {
        background-color: #ffffff !important;
      }
      [data-theme='premium_ethereal'] .bg-zinc-800,
      [data-theme='premium_ethereal'] .bg-zinc-900\/50 {
        background-color: #f1f5f9 !important;
      }
      [data-theme='premium_ethereal'] .border-white\/5,
      [data-theme='premium_ethereal'] .border-white\/10 {
        border-color: #e2e8f0 !important;
      }

      [data-theme='premium_crimson'] {
        --nexus-bg: #000000;
        --nexus-card: #1a0000;
        --nexus-accent: #DC143C;
        --nexus-accent-alt: #990000;
        --nexus-accent-rgb: 220, 20, 60;
        --nexus-border: #4d0000;
      }
      body[data-theme='premium_crimson'] {
        background: radial-gradient(circle at center, #1a0000, #000000);
        background-attachment: fixed;
      }

      body {
        background-color: var(--nexus-bg);
        color: #f4f4f5;
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        transition: background-color 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      ::selection { background: var(--nexus-accent); color: #fff; }

      .custom-scrollbar::-webkit-scrollbar { width: 5px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #3f3f46; }

      .glass {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--nexus-border);
      }

      .glass-card {
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0) 100%);
        backdrop-filter: blur(12px);
        border: 1px solid var(--nexus-border);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .glass-card:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--nexus-accent);
        transform: translateY(-4px) scale(1.01);
      }

      .bento-grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        grid-auto-rows: minmax(100px, auto);
        gap: 1.5rem;
      }
    </style>
